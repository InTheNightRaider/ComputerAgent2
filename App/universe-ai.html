function usePersisted(key,def){
  const[v,setV]=useState(()=>ls.get(key,def))
  const set=useCallback(val=>{const nv=typeof val==='function'?val(v):val;setV(nv);ls.set(key,nv)},[key])
  return[v,set]}

// ═══ OLLAMA API ═══
const OLLAMA='http://localhost:11434'
async function ollamaPing(){try{const r=await fetch(OLLAMA+'/api/tags',{signal:AbortSignal.timeout(2000)});return r.ok}catch{return false}}
async function ollamaModels(){try{const r=await fetch(OLLAMA+'/api/tags');const d=await r.json();return d.models||[]}catch{return[]}}
async function ollamaChat(msgs,model='mistral:7b-instruct'){
  const r=await fetch(OLLAMA+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model,messages:msgs,stream:false})})
  if(!r.ok)throw new Error('Ollama '+r.status)
  const d=await r.json();return d.message?.content||''}
async function ollamaPull(name,onProg){
  const r=await fetch(OLLAMA+'/api/pull',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,stream:true})})
  const reader=r.body.getReader();const dec=new TextDecoder()
  while(true){const{done,value}=await reader.read();if(done)break
    for(const line of dec.decode(value).split('\n').filter(Boolean)){
      try{const d=JSON.parse(line);if(d.total&&d.completed)onProg(Math.round(d.completed/d.total*100));
        else if(d.status)onProg(d.status)}catch{}}}}

// ═══ HF API ═══
const HFB='https://api-inference.huggingface.co'
async function hfChat(msgs,model='mistralai/Mistral-7B-Instruct-v0.3'){
  const r=await fetch(HFB+'/v1/chat/completions',{method:'POST',
    headers:{Authorization:'Bearer '+HF_TOKEN,'Content-Type':'application/json'},
    body:JSON.stringify({model,messages:msgs,max_tokens:600,stream:false})})
  if(!r.ok)throw new Error('HF '+r.status)
  const d=await r.json();return d.choices?.[0]?.message?.content||''}
async function hfInfer(model,payload,blob=false){
  const isBlob=payload instanceof Blob
  const r=await fetch(HFB+'/models/'+model,{method:'POST',
    headers:{Authorization:'Bearer '+HF_TOKEN,...(!isBlob&&{'Content-Type':'application/json'})},
    body:isBlob?payload:JSON.stringify(payload)})
  if(!r.ok)throw new Error('HF '+r.status)
  return blob?r.blob():r.json()}

// ═══ ANTHROPIC API ═══
async function anthropicChat(msgs,key,model='claude-haiku-3-5'){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model,max_tokens:600,messages:msgs})})
  if(!r.ok)throw new Error('Anthropic '+r.status)
  const d=await r.json();return d.content?.[0]?.text||''}

// ═══ MODEL ROUTER ═══
async function aiChat(msgs,{ollamaOk,settings}={}){
  const s=settings||{}
  if(ollamaOk){try{return{text:await ollamaChat(msgs,s.ollamaModel||'mistral:7b-instruct'),via:'Ollama'}}catch{}}
  if(s.anthropicEnabled&&s.anthropicKey){
    try{
      const spend=ls.get('spend_'+new Date().toDateString(),0)
      if(spend<(s.budget||2)){
        const text=await anthropicChat(msgs,s.anthropicKey)
        ls.set('spend_'+new Date().toDateString(),(spend+0.001))
        return{text,via:'Claude Haiku'}}
    }catch{}}
  try{return{text:await hfChat(msgs),via:'HuggingFace'}}catch{}
  return{text:'All AI providers unavailable. Check Ollama or settings.',via:'none'}}

        h('div',{style:{fontSize:13,color:T.mu,marginBottom:20}},'Provide inputs to start this pipeline.'),
        runModal.inputs.map(inp=>h('div',{key:inp.id,style:{marginBottom:14}},
          h('div',{style:{fontSize:12,fontWeight:600,marginBottom:5}},inp.label,inp.required&&h('span',{style:{color:T.rd,marginLeft:4}},'*')),
          inp.type==='file'?h('div',{style:{border:'2px dashed '+T.b2,borderRadius:10,padding:20,textAlign:'center',cursor:'pointer',background:T.s3}},
            h('div',{style:{fontSize:24,marginBottom:4}},'📎'),h('div',{style:{fontSize:12,color:T.mu}},'Drop file or click to browse'),h('div',{style:{fontSize:10,color:T.mu2,marginTop:4}},inp.ext)):
          inp.type==='dropdown'?h('select',{value:runInputs[inp.id]||inp.opts[0],onChange:e=>setRunInputs(p=>({...p,[inp.id]:e.target.value})),style:inputSx},inp.opts.map(o=>h('option',{key:o,value:o},o))):
          h('textarea',{rows:3,value:runInputs[inp.id]||'',onChange:e=>setRunInputs(p=>({...p,[inp.id]:e.target.value})),placeholder:inp.ph||'',style:inputSx}))),
        h('div',{style:{display:'flex',gap:10,marginTop:8}},
          h('button',{onClick:()=>setRunModal(null),style:{flex:1,padding:'10px',background:T.s3,border:'1px solid '+T.b,borderRadius:8,color:T.mu,cursor:'pointer'}},'Cancel'),
          h(Btn,{onClick:()=>{const m=runModal;setRunModal(null);runPipeline(m,runInputs)},sx:{flex:2,padding:'10px',fontSize:14}},'▶ Start Pipeline')))))

  // ── Settings ──
  const Settings=()=>{
    const[loc,setLoc]=useState({...settings})
    const[testing,setTesting]=useState(false)
    const[testResult,setTestResult]=useState(null)
    const[pulling,setPulling]=useState(null)
    const[pullPct,setPullPct]=useState(0)
    const save=()=>setSettings(loc)
    const testAnthropic=async()=>{
      setTesting(true);setTestResult(null)
      try{const t=await anthropicChat([{role:'user',content:'Reply with exactly: OK'}],loc.anthropicKey);setTestResult(t.includes('OK')?'success':'warn')}
      catch(e){setTestResult('fail')}
      setTesting(false)}
    const pull=async model=>{
      setPulling(model);setPullPct(0)
      try{await ollamaPull(model,p=>{if(typeof p==='number')setPullPct(p)})}
      catch{}
      const ms=await ollamaModels();setOllamaModelList(ms);setPulling(null)}
    const WANT_MODELS=[{id:'mistral:7b-instruct',size:'4GB',desc:'Primary chat'},{id:'codellama:13b',size:'8GB',desc:'Code'},{id:'nomic-embed-text',size:'274MB',desc:'Embeddings'}]
    const hasModel=id=>ollamaModelList.some(m=>m.name===id||m.name.startsWith(id.split(':')[0]))
    return h('div',{style:{flex:1,overflowY:'auto',padding:'24px',maxWidth:680,margin:'0 auto',width:'100%'}},
      h('div',{style:{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:20,marginBottom:20}},'Settings'),

      // Ollama
      h('div',{style:{background:T.s2,border:'1px solid '+T.b,borderRadius:12,padding:18,marginBottom:14}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:16}},
          h('div',{style:{fontSize:20}},'🦙'),
          h('div',{style:{flex:1}},h('div',{style:{fontWeight:700,fontSize:15}},'Local Models — Ollama'),
            h('div',{style:{fontSize:12,color:T.mu}},'Always available, no API costs')),
          h('div',{style:{display:'flex',alignItems:'center',gap:6}},
            dot(ollamaOk?T.gr:T.rd,ollamaOk),
            h('span',{style:{fontSize:12,color:ollamaOk?T.gr:T.rd,fontWeight:600}},ollamaOk?'Connected':'Not running'))),
        !ollamaOk&&h('div',{style:{background:T.amb+'15',border:'1px solid '+T.amb+'44',borderRadius:8,padding:12,marginBottom:12,fontSize:12}},
          h('div',{style:{fontWeight:600,color:T.amb,marginBottom:4}},'Ollama not detected'),
          h('div',{style:{color:T.mu}},'Install from '),h('a',{href:'https://ollama.ai',target:'_blank',style:{color:T.ac}},'ollama.ai'),
          h('div',{style:{color:T.mu,marginTop:4}},'Then run: '),h('code',{style:{fontFamily:"'JetBrains Mono',monospace",color:T.tl}},'ollama serve')),
        h(Field,{label:'Default Model'},
          h('select',{value:loc.ollamaModel,onChange:e=>setLoc(l=>({...l,ollamaModel:e.target.value})),style:inputSx},
            [...ollamaModelList.map(m=>h('option',{key:m.name,value:m.name},m.name)),
              !ollamaModelList.length&&h('option',{key:'none',value:'mistral:7b-instruct'},'mistral:7b-instruct')])),
        h('div',{style:{fontSize:11,fontWeight:600,color:T.mu,textTransform:'uppercase',marginBottom:8}},'Model Library'),
        WANT_MODELS.map(m=>{
          const has=hasModel(m.id)
          const isPulling=pulling===m.id
          return h('div',{key:m.id,style:{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',background:has?T.gr+'12':T.s3,borderRadius:8,marginBottom:5,border:'1px solid '+(has?T.gr+'33':T.b)}},
            dot(has?T.gr:T.mu2),
            h('div',{style:{flex:1}},h('div',{style:{fontSize:12,fontWeight:500}},m.id),h('div',{style:{fontSize:10,color:T.mu}},m.desc+' — '+m.size)),
            has?tag(T.gr,'Ready',{fontSize:9}):
              isPulling?h('div',{style:{display:'flex',alignItems:'center',gap:6}},h(spin),h('span',{style:{fontSize:11,color:T.amb}},pullPct+'%')):
              h('button',{onClick:()=>pull(m.id),disabled:!ollamaOk,style:{padding:'3px 10px',background:T.ac,border:'none',borderRadius:5,color:T.tx,cursor:'pointer',fontSize:11,opacity:ollamaOk?1:.4}},'Pull'))})),

      // Anthropic
      h('div',{style:{background:T.s2,border:'1px solid '+(loc.anthropicEnabled?T.ac+'55':T.b),borderRadius:12,padding:18,marginBottom:14}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:loc.anthropicEnabled?16:0}},
          h('div',{style:{fontSize:20}},'🤖'),
          h('div',{style:{flex:1}},h('div',{style:{fontWeight:700,fontSize:15}},'Anthropic Claude'),h('div',{style:{fontSize:12,color:T.mu}},'Optional — claude-haiku-3-5 only (cheapest)')),
          h('div',{onClick:()=>setLoc(l=>({...l,anthropicEnabled:!l.anthropicEnabled})),style:{width:40,height:22,borderRadius:11,background:loc.anthropicEnabled?T.ac:T.s4,cursor:'pointer',position:'relative',transition:'background .2s'}},
            h('div',{style:{position:'absolute',top:4,left:loc.anthropicEnabled?20:4,width:14,height:14,borderRadius:'50%',background:'#fff',transition:'left .2s'}}))),
        loc.anthropicEnabled&&h('div',null,
          h(Field,{label:'API Key'},
            h('div',{style:{display:'flex',gap:8}},
              h('input',{type:'password',value:loc.anthropicKey,onChange:e=>setLoc(l=>({...l,anthropicKey:e.target.value})),placeholder:'sk-ant-…',style:{...inputSx,flex:1}}),
              h('button',{onClick:testAnthropic,disabled:testing||!loc.anthropicKey,style:{padding:'8px 12px',background:T.bl,border:'none',borderRadius:7,color:T.tx,cursor:'pointer',fontSize:12}},testing?'…':'Test'),
              testResult&&h('span',{style:{color:testResult==='success'?T.gr:T.rd,fontSize:20}},testResult==='success'?'✓':'✗'))),
          h(Field,{label:'Daily Budget'},
            h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
              h('input',{type:'number',value:loc.budget,onChange:e=>setLoc(l=>({...l,budget:Number(e.target.value)})),style:{...inputSx,width:80}},),
              h('span',{style:{fontSize:12,color:T.mu}},'USD / day  (warn at $0.50, stop at limit)'),
              h('span',{style:{fontSize:12,color:T.mu}},'Today: $'+(ls.get('spend_'+new Date().toDateString(),0)).toFixed(4)))),
          h('div',{style:{fontSize:11,color:T.amb,padding:'8px 10px',background:T.amb+'15',borderRadius:7}},'⚠ API key mode charges per token. Use OAuth at claude.ai for your Pro/Max subscription instead.'))),

      h('div',{style:{display:'flex',gap:10,marginTop:4}},
        h(Btn,{onClick:save,v:'ok'},'Save Settings'),
        h(Btn,{onClick:async()=>{const ok=await ollamaPing();setOllamaOk(ok);if(ok){const ms=await ollamaModels();setOllamaModelList(ms)}},v:'ghost'},'Refresh Ollama'))))

  // ── Stubs for steps 2 & 3 ──
  const Stub=({icon,title,msg})=>h('div',{style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:T.mu,gap:12}},
    h('div',{style:{fontSize:48}}),h('div',{style:{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:20,color:T.tx}}),
    h('div',{style:{fontSize:13,color:T.mu,textAlign:'center',maxWidth:400,lineHeight:1.7}},
      h('div',{style:{fontSize:52,marginBottom:12}},icon),
      h('div',{style:{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:20,color:T.tx,marginBottom:8}},title),msg))

  const openTab=(id,label,comp,data)=>{setDynTabs(p=>[...p.filter(x=>x.id!==id),{id,label,closeable:true,comp,data}]);setTab(id)}
  const closeTab=id=>{setDynTabs(p=>p.filter(x=>x.id!==id));setTab('chat')}

  // ── Tab routing ──
  const renderContent=()=>{
    if(tab==='chat')return h(Chat)
    if(tab==='pipelines')return h(Pipelines)
    if(tab==='tools')return h(Stub,{icon:'🔧',title:'Tools Hub',msg:'Step 3 coming next — Voice Recorder, Outreach Intelligence, Summarizer, Translator, Image Generator, and more'})
    if(tab==='automations')return h(Stub,{icon:'⚡',title:'Automations + AI Copilot',msg:'Step 2 coming next — drag-drop canvas with AI Copilot sidebar that builds automations from natural language'})
    if(tab==='connections')return h(Stub,{icon:'🔌',title:'Connections',msg:'Step 2 coming next — multi-account service connections'})
    if(tab==='agents')return h(Stub,{icon:'🤖',title:'Agents',msg:'Autonomous background workers — coming in Step 3'})
    if(tab==='settings')return h(Settings)
    const dyn=dynTabs.find(t=>t.id===tab)
    if(dyn)return h('div',{style:{padding:32,flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:T.mu}},
      h('div',{style:{fontSize:48,marginBottom:12}}),h('div',{style:{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:20,color:T.tx,marginBottom:6}},dyn.data?.name||'Tool'),
      h('div',{style:{fontSize:13,color:T.mu}},dyn.data?.desc||'Custom tool built via chat'))
    return null}

  const TABS=[{id:'chat',label:'💬 Chat'},{id:'pipelines',label:'🔄 Pipelines'},{id:'tools',label:'🔧 Tools'},{id:'automations',label:'⚡ Automations'},{id:'connections',label:'🔌 Connections'},{id:'agents',label:'🤖 Agents'},{id:'settings',label:'⚙️ Settings'}]
  const allTabs=[...TABS,...dynTabs]
  const spend=ls.get('spend_'+new Date().toDateString(),0)

  return h('div',{style:{background:T.bg,height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}},
    h('style',null,'@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}@keyframes pulse{0%,100%{opacity:.2;transform:scale(.75)}50%{opacity:1;transform:scale(1)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes blink{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(220,53,69,.4)}50%{box-shadow:0 0 0 10px rgba(220,53,69,0)}}'),
    !onboarded&&h(Onboarding),

    // Header
    h('div',{style:{background:T.s1,borderBottom:'1px solid '+T.b,padding:'0 20px',height:50,display:'flex',alignItems:'center',gap:14,flexShrink:0}},
      h('div',{style:{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,display:'flex',alignItems:'center',gap:8}},
        h('div',{style:{width:27,height:27,borderRadius:7,background:'linear-gradient(135deg,'+T.ac+','+T.pk+')',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}},'🌌'),
        h('span',{style:{color:T.ac}},'Universe'),h('span',null,' AI')),
      h('div',{style:{flex:1}}),
      badge(ollamaOk?T.gr:T.rd,dot(ollamaOk?T.gr:T.rd,ollamaOk),ollamaOk?'Ollama Ready':'No Local AI'),
      settings.anthropicEnabled&&settings.anthropicKey&&badge(T.ac,'Claude Haiku'),
      spend>0&&badge(T.amb,'$'+spend.toFixed(3)+' today')),

    // Tabs
    h('div',{style:{background:T.s1,borderBottom:'1px solid '+T.b,padding:'0 18px',display:'flex',overflowX:'auto',flexShrink:0}},
      allTabs.map(t=>h('div',{key:t.id,style:{display:'flex',alignItems:'center',gap:4,flexShrink:0}},
        h('button',{onClick:()=>setTab(t.id),style:{padding:'10px 15px',background:'none',border:'none',borderBottom:tab===t.id?'2px solid '+T.ac:'2px solid transparent',color:tab===t.id?T.tx:T.mu,cursor:'pointer',fontSize:13,fontWeight:tab===t.id?500:400,marginBottom:-1,whiteSpace:'nowrap'}},t.label),
        t.closeable&&h('button',{onClick:e=>{e.stopPropagation();closeTab(t.id)},style:{background:'none',border:'none',color:T.mu2,cursor:'pointer',fontSize:13,padding:'0 3px',marginLeft:-6}},'×')))),

    h('div',{style:{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}},renderContent()))
}
createRoot(document.getElementById('app')).render(h(App))
</script>
</body>
</html>
