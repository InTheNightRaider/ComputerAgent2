name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.1)'
        required: true

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: App/src-tauri -> target

      - name: Install frontend dependencies
        run: npm install
        working-directory: App/frontend

      - name: Install app dependencies
        run: npm install
        working-directory: App

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: App
          tagName: ${{ github.ref_name || inputs.tag }}
          releaseName: Universe AI ${{ github.ref_name || inputs.tag }}
          releaseBody: |
            ## What's new
            See commit history for changes.

            ## Install
            Download the `.exe` installer below and run it.
            Existing installs will auto-update on next launch.
          releaseDraft: false
          prerelease: false
